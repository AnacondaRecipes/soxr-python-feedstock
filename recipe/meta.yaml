{% set name = "soxr" %}
{% set version = "1.1.0" %}

package:
  name: soxr-python
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/soxr-{{ version }}.tar.gz
  sha256: 9f228ae21c78fa9359ca98d8a5e8e91f30639e438e574133dace62c5b5309e44

build:
  number: 0
  # Build the bundled libsoxr (USE_SYSTEM_LIBSOXR defaults OFF). pkgs/main's `soxr`
  # ships only the runtime lib (no libsoxr.so dev symlink), so system linking would fail.
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  build:
    - cmake
    - ninja
    - make  # [unix]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - scikit-build-core >=0.11
    - nanobind >=2.0.0,<3
    - setuptools >=45
    - setuptools_scm >=6.2
    - typing_extensions  # [py<311]
  run:
    - python
    - numpy

test:
  source_files:
    - tests/
  imports:
    - soxr
  commands:
    - pip check
    - pytest ./tests
  requires:
    - pip
    - pytest

about:
  home: https://github.com/dofuuz/python-soxr
  summary: High quality, one-dimensional sample-rate conversion library
  description: |
    Python-SoXR is a Python wrapper of the libsoxr resampling library. It
    provides fast, high quality, one-dimensional sample-rate conversion for
    audio and other signals as NumPy arrays.
  doc_url: https://python-soxr.readthedocs.io
  dev_url: https://github.com/dofuuz/python-soxr
  license: LGPL-2.1-or-later
  license_family: LGPL
  license_file:
    - COPYING.LGPL
    - LICENSE.txt

extra:
  recipe-maintainers:
    - dofuuz
